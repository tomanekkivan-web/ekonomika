<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekonomické ukazovatele SR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-10">
    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden">
        <div class="bg-blue-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold uppercase tracking-wide">Ekonomické dáta SR</h1>
            <p id="last-update" class="text-sm opacity-80 mt-2">Načítavam dáta...</p>
        </div>
        
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-200 text-gray-700 uppercase text-sm">
                    <th class="p-4 border-b">Veličina</th>
                    <th class="p-4 border-b text-right">Hodnota</th>
                    <th class="p-4 border-b text-right">Zmena (%)</th>
                </tr>
            </thead>
            <tbody id="data-table">
                <!-- Dáta sa vložia sem -->
            </tbody>
        </table>
    </div>

    <script>
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const table = document.getElementById('data-table');
                document.getElementById('last-update').innerText = "Posledná aktualizácia: " + data.timestamp;
                
                data.indicators.forEach(item => {
                    const color = item.change >= 0 ? 'text-green-600' : 'text-red-600';
                    const sign = item.change > 0 ? '+' : '';
                    
                    table.innerHTML += `
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="p-4 font-medium">${item.name}</td>
                            <td class="p-4 text-right font-bold">${item.value}</td>
                            <td class="p-4 text-right ${color} font-semibold">${sign}${item.change}%</td>
                        </tr>
                    `;
                });
            });
    </script>
</body>
</html>
